name: "kanban_services"

services:
  postgres_cluster:
    image: postgres:15
    container_name: kanban_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: db
    ports:
      - "5432:5432"
    volumes:
      - postgres_cluster_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init-dbs.sql:/docker-entrypoint-initdb.d/init-dbs.sql
    restart: always

  statistic_db:
    image: postgres:15
    container_name: statistic_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: statistic_db
    ports:
      - "5436:5432"
    volumes:
      - statistic_data:/var/lib/postgresql/data

  workspace_db:
    image: postgres:15
    container_name: workspace_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: workspace_db
    ports:
      - "5437:5432"
    volumes:
      - workspace_data:/var/lib/postgresql/data

  auth_service:
    image: node:20-alpine
    container_name: auth_service
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "npm install && npm run auth:dev"
    environment:
      AUTH_URL: postgres://admin:admin@auth_db:5432/auth_db
      AUTH_PORT: "9001"
    ports:
      - "9001:9001"
    depends_on:
      - auth_db

  board_service:
    image: node:20-alpine
    container_name: board_service
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "npm install && npm run board:dev"
    environment:
      BOARD_URL: postgres://admin:admin@board_db:5432/board_db
      BOARD_PORT: "9003"
    ports:
      - "9003:9003"
    depends_on:
      - board_db

  noti_service:
    image: node:20-alpine
    container_name: noti_service
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "npm install && npm run noti:dev"
    environment:
      NOTI_URL: postgres://admin:admin@noti_db:5432/noti_db
      NOTI_PORT: "9004"
    ports:
      - "9004:9004"
    depends_on:
      - noti_db

  statistic_service:
    image: node:20-alpine
    container_name: statistic_service
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "npm install && npm run stat:dev"
    environment:
      DATABASE_URL: postgresql://admin:admin@statistic_db:5432/statistic_db
      PORT: "9002"
      JWT_SECRET: ${JWT_SECRET:-change_me}
      WORKSPACE_SERVICE_URL: http://workspace_service:9005
      BOARD_SERVICE_URL: http://board_service:9003
    ports:
      - "9002:9002"
    depends_on:
      - statistic_db

  workspace_service:
    image: node:20-alpine
    container_name: workspace_service
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "npm install && npm run workspace:dev"
    environment:
      DATABASE_URL: postgres://admin:admin@workspace_db:5432/workspace_db
      PORT: "9005"
      JWT_SECRET: ${JWT_SECRET:-change_me}
    ports:
      - "9005:9005"
    depends_on:
      - workspace_db

  api_gateway:
    image: node:20-alpine
    container_name: api_gateway
    working_dir: /app/root/api-gateway
    volumes:
      - .:/app
    command: sh -c "npm install && npm run dev"
    environment:
      GATEWAY_PORT: "8080"
      NODE_ENV: development
      JWT_SECRET: ${JWT_SECRET:-change_me}
      AUTH_SERVICE_URL: http://auth_service:9001
      WORKSPACE_SERVICE_URL: http://workspace_service:9005
      BOARD_SERVICE_URL: http://board_service:9003
      NOTI_SERVICE_URL: http://noti_service:9004
      STATISTIC_SERVICE_URL: http://statistic_service:9002
      RATE_LIMIT_WINDOW_MS: "60000"
      RATE_LIMIT_MAX_REQUESTS: "100"
      CORS_ORIGINS: http://localhost:3000
      UPSTREAM_TIMEOUT_MS: "10000"
    ports:
      - "8080:8080"
    depends_on:
      - auth_service
      - board_service
      - noti_service
      - statistic_service
      - workspace_service

volumes:
  postgres_cluster_data:
