name: "kanban"
version: "3.9"
services:
  postgres:
    image: postgres:15
    container_name: workspace_db_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: workspace_db
    ports:
      # Test with port: 5437
      - "5437:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # restart: always
volumes:
  postgres_data:
