syntax = "proto3";

package auth;

message Session {
  int64 id = 1;
  string token = 2;
  string user_id = 3;
  int64 expires_at = 4;
  int64 created_at = 5;
  int64 updated_at = 6;
}

message User {
  string id = 1;
  string name = 2;
  string email = 3;
  string image = 4;
}

message Account {
  int64 id = 1;
  string user_id = 2;
  string provider_id = 3;
  string account_id = 4;
  optional string access_token = 5;
  optional string refresh_token = 6;
  optional string id_token = 7;
  optional string scope = 8;
  int64 created_at = 9;
  int64 updated_at = 10;
}

message Verification {
  int64 id = 1;
  string identifier = 2;
  string value = 3;
  int64 expires_at = 4;
  int64 created_at = 5;
  int64 updated_at = 6;
}

message CreateSessionRequest {
  string user_id = 1;
  string ip_address = 2;
  string user_agent = 3;
}

message CreateSessionResponse {
  Session session = 1;
}

message GetSessionRequest {
  string token = 1;
}

message GetSessionResponse {
  Session session = 1;
}

message GetSessionWithUserRequest {
  string token = 1;
}

message GetSessionWithUserResponse {
  Session session = 1;
  User user = 2;
}

message DeleteSessionRequest {
  int64 id = 1;
}

message DeleteSessionResponse {
  bool success = 1;
}

message DeleteUserSessionsRequest {
  string user_id = 1;
}

message DeleteUserSessionsResponse {
  bool success = 1;
}

message LinkAccountRequest {
  string user_id = 1;
  string provider_id = 2;
  string account_id = 3;
  optional string access_token = 4;
  optional string refresh_token = 5;
  optional string id_token = 6;
  optional string scope = 7;
}

message LinkAccountResponse {
  Account account = 1;
}

message UnlinkAccountRequest {
  string user_id = 1;
  string provider_id = 2;
}

message UnlinkAccountResponse {
  bool success = 1;
}

message GetUserAccountsRequest {
  string user_id = 1;
}

message GetUserAccountsResponse {
  repeated Account accounts = 1;
}

message CreateVerificationRequest {
  string identifier = 1;
  optional string value = 2;
  optional int32 expires_in_minutes = 3;
}

message CreateVerificationResponse {
  Verification verification = 1;
}

message VerifyCodeRequest {
  string identifier = 1;
  string code = 2;
}

message VerifyCodeResponse {
  bool success = 1;
}

service SessionService {
  rpc createSession (CreateSessionRequest) returns (CreateSessionResponse);
  rpc getSession (GetSessionRequest) returns (GetSessionResponse);
  rpc getSessionWithUser (GetSessionWithUserRequest) returns (GetSessionWithUserResponse);
  rpc deleteSession (DeleteSessionRequest) returns (DeleteSessionResponse);
  rpc deleteUserSessions (DeleteUserSessionsRequest) returns (DeleteUserSessionsResponse);
  rpc linkAccount (LinkAccountRequest) returns (LinkAccountResponse);
  rpc unlinkAccount (UnlinkAccountRequest) returns (UnlinkAccountResponse);
  rpc getUserAccounts (GetUserAccountsRequest) returns (GetUserAccountsResponse);
  rpc createVerification (CreateVerificationRequest) returns (CreateVerificationResponse);
  rpc verifyCode (VerifyCodeRequest) returns (VerifyCodeResponse);
}